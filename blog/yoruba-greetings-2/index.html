Beyond acknowledging the different parts of the day, **kú** can also be used to offer compliments. **Kú iṣẹ́**, for example, greets the receiver for being invested in a particular activity — and can be offered both genuinely and sarcastically. Iṣẹ́ means work or job.

## Kú for felicitations

**Ọdún** and **ayẹyẹ** mean festival and celebration respectively. When felicitations are intended, we say **kú ayẹyẹ** or **kú ọdún**. The particular celebration being greeted for can be further described by adding words to the greeting. For example:

- **Kú ọdún tuntun** — Happy New Year (tuntun means "new")
- **Kú ayẹyẹ ìṣílé** — Congratulations on the housewarming (ìṣílé means "housewarming")

## Kú for endurance and survival

Since kú acknowledges the experience of the one being greeted, it also functions to salute the greetee for enduring or surviving an event. **Ẹ kú ewu ọmọ** is used to greet a woman who has just given birth — and her well-wishers — for surviving the risk of childbirth. Ewu means risk or danger, while ọmọ means child.

**Ẹ kú ewu ọkọ̀** is used for someone who has just arrived from a long trip. Ọkọ̀ is the general expression for vehicles.

## The role of Ẹ

Yoruba greetings put status and hierarchy into consideration. **Ẹ** represents the word "you" when used for two or more people — in other words, Ẹ is the plural "you". However, Ẹ can also be used to address one person when greeting, where it suggests respect for the receiver.

Therefore, **kú àárọ̀** when used for one person with honour becomes **ẹ kú àárọ̀**. Ẹ performs its original function of plurality when used for two or more people — it remains **ẹ kú àárọ̀** regardless of the status or hierarchy of those being addressed.
