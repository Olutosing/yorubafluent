Ní ọ̀sán ọjọ́ kan ní ọdún 1914, ọdọmọkùnrin kan tí orúkọ rẹ̀ ń jẹ́ **Gavrilo Princip** yí ìtàn gbogbo agbáyé padà. Ní ìlú kan tí a ń pè ní Sarajevo, ní orílẹ̀-èdè Bosnia, ọmọkùnrin náà ṣẹkú pa **Franz Ferdinand**, ẹni tí ó jẹ́ bíi arólé ọba fún ilẹ̀ Austria-Hungary. Ìdí ni pé àwọn ará orílẹ̀-èdè Bosnia kò fẹ́ jẹ́ ẹ̀ka orílẹ̀-èdè Austria-Hungary — wọ́n fẹ́ dara pọ̀ mọ́ orílẹ̀-èdè Serbia. Ìṣẹ̀lẹ̀ yìí gan ni ó ṣàna sí rogbòdìyàn ogun agbáyé kìíní.

## Bí ó ṣe jẹ ogun gbogbo agbáyé

Ṣáájú ìṣẹ̀lẹ̀ yìí, àwọn orílẹ̀-èdè alágbára lágbáàyé ti ń padì apò pọ̀, tí wọ́n sì ń di rikisi sí ara wọn. Wọ́n ń dù kúùkú làjà sára wọn lábẹ̀lẹ̀, wọ́n sì tún ń bá ara wọn ṣe ọ̀rẹ́ agidí. Ẹgbẹ́ àkọ́kọ́ ni orílẹ̀-èdè France, Russia àti Britain — ẹgbẹ́ ẹkejì ni orílẹ̀-èdè Germany, Austria-Hungary àti Italy.

Lẹ́yìn ìṣẹ̀lẹ̀ ìṣẹkúpani arólé Austria-Hungary tí a mẹ́nu bà sáájú, Austria-Hungary bá ṣídé ogun sí Serbia. Russia sọ wípé òun yíò ti Serbia lẹ́yìn — bẹ́ẹ̀ náà ni Germany tutọ sókè, ó fojú gbà á wípé òun yíò ti Austria-Hungary lẹ́hìn.

## Àwọn ẹgbẹ́ ija

Àṣeyínwà àṣẹyínbọ̀, ìjà náà kúrò ní ìjà Europe nìkan — ó di ìjà gbogbo agbáyé nítorí àwọn orílẹ̀-èdè agbáyé bẹ̀rẹ̀ sí ní gbé sí ara wọn lẹ́yìn, wọ́n fi ìjà pẹẹtà. A wà ní ẹgbẹ́ méjì gbànkọ́gbànkọ́:

- **Àwọn Allies** — France, Russia, Britain, àti Italy; Amẹ́ríkà darapọ̀ mọ́ wọn ní ọ̀rẹ̀hìnrẹ̀hìn
- **Central Powers** — Germany, Austria-Hungary, Ìjọba Ottoman àti Bulgaria

## Ojú ìjà àti trenches

Ojú ìjà méjì godogodo lo wà. Ní ìwọ̀ oòrùn, Germany bá France, Britain àti Amẹ́ríkà jà — ní ìlà oòrùn, Germany àti Austria-Hungary bá Russia fi ìjà pẹẹtà.

Inú kotò ìjà tí a mọ̀ sí **trenches** ni ọ̀pọ̀ ogun náà ti wáyé jù. Ọ̀pọ̀lọpọ̀ ẹ̀mí lo sọnù láàárín ọdún 1914 sí 1918 tí ìjà náà fi wáyé.

## Òpin ogun

Wọ́n dékùn ìjà jíjà ní ọdún 1918 nígbà tí àwọn ẹgbẹ́ Central Powers fi ìdí rẹ́mí. Ní ọdún 1919, àwọn orílẹ̀-èdè bú ọwọ́ lu àdéhùn kan tí a ń pè ní **Treaty of Versailles** — èyí ṣe àmì fún òpin ogun náà.
