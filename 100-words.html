<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your First 100 Words — YorubaFluent</title>
  <meta name="description" content="Learn your first 100 Yoruba words with interactive flashcards and quizzes.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ───────────────────────────────────────────── */
    :root {
      --teal:       #0F827A;
      --teal-deep:  #0A5C56;
      --coral:      #E07A5F;
      --coral-deep: #C45E44;
      --gold:       #FFB300;
      --gold-deep:  #CC8F00;
      --ink:        #1A1A1A;
      --ink-mid:    #636363;
      --ink-faint:  #ABABAB;
      --bg:         #F5F2EC;
      --surface:    #FFFFFF;
      --divider:    rgba(26,26,26,0.12);
      --shadow-sm:  3px 3px 0 #1A1A1A;
      --shadow-md:  5px 5px 0 #1A1A1A;
      --shadow-lg:  8px 8px 0 #1A1A1A;
      --font:       'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif;
      --font-display: 'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif;
      --ease:       cubic-bezier(0.4, 0, 0.2, 1);
      --dur:        140ms;
      --dur-fast:   140ms;
      --dur-normal: 280ms;
      --pad:        clamp(16px, 5vw, 60px);
      --page-pad:   clamp(16px, 5vw, 60px);
    }

    @font-face {
      font-family: 'Flegrei';
      src: url('Flegrei-Yoruba.otf') format('opentype');
      font-weight: normal; font-style: normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button, a, [role="button"], [tabindex] { touch-action: manipulation; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV (overrides blog-ui.js injected styles) ───────── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--ink);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--pad); height: 52px;
    }
    .nav-logo-group { display: flex; flex-direction: column; }
    .nav-logo {
      font-family: 'Flegrei', Georgia, serif; font-size: 1.5rem; font-weight: normal;
      letter-spacing: -0.02em; color: var(--gold); text-decoration: none; line-height: 1;
    }
    .nav-byline { font-size: 0.5rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-top: 1px; }
    .pill-nav { display: flex; gap: 8px; align-items: center; }
    .pill {
      font-family: var(--font); font-size: 0.6rem; font-weight: 800; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 6px 14px; border-radius: 999px;
      text-decoration: none; border: 1.5px solid rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.6); transition: all var(--dur); display: inline-block;
    }
    .pill:hover { border-color: #fff; color: #fff; }
    .pill-home { background: var(--coral); border-color: var(--coral); color: #fff; }
    .pill-about { background: var(--gold); border-color: var(--gold); color: var(--ink); }
    .pill-blog  { border-color: rgba(255,255,255,0.3); }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
    .hamburger span { display: block; width: 22px; height: 2px; background: #fff; transition: all var(--dur-normal) var(--ease); }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-menu { display: none; flex-direction: column; gap: 10px; padding: 16px var(--pad); background: var(--ink); border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 52px; z-index: 99; }
    .mobile-menu.open { display: flex; }
    .mobile-menu .pill { width: fit-content; }
    @media (max-width: 600px) { .pill-nav { display: none; } .hamburger { display: flex; } }

    /* ── FOOTER ───────────────────────────────────────────── */
    .footer { border-top: 3px solid var(--ink); padding: 20px var(--pad); background: var(--ink); }
    .footer-inner { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; }
    .footer-brand-group { display: flex; flex-direction: column; }
    .footer-brand { font-family: 'Flegrei', Georgia, serif; font-size: 1.8rem; font-weight: normal; letter-spacing: -0.02em; color: var(--gold); text-decoration: none; }
    .footer-byline { font-size: 0.62rem; font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-top: 2px; }
    .footer-nav { display: flex; flex-direction: column; gap: 10px; }
    .footer-nav a { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.45); text-decoration: none; transition: color var(--dur); }
    .footer-nav a:hover { color: var(--gold); }
    .footer-social { display: flex; gap: 18px; align-items: center; margin-bottom: 20px; }
    .footer-social a { display: flex; color: rgba(255,255,255,0.4); text-decoration: none; transition: color var(--dur); }
    .footer-social a svg { width: 18px; height: 18px; display: block; }
    .footer-social a:hover { color: var(--gold); }
    .footer-bottom { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .footer-copy { font-size: 0.68rem; color: rgba(255,255,255,0.22); letter-spacing: 0.06em; }

    /* ── PAGE HEADER ──────────────────────────────────────── */
    .page-header {
      background: var(--teal);
      padding: clamp(32px, 5vw, 56px) var(--pad) clamp(28px, 4vw, 48px);
      position: relative; overflow: hidden;
    }
    .page-header::before {
      content: ''; position: absolute; right: -80px; top: -100px;
      width: 460px; height: 460px; border-radius: 50%;
      border: 52px solid rgba(255,255,255,0.05); pointer-events: none;
    }
    .page-header::after {
      content: ''; position: absolute; right: 80px; bottom: -60px;
      width: 180px; height: 180px; border-radius: 50%;
      border: 28px solid rgba(255,255,255,0.04); pointer-events: none;
    }
    .page-header-inner { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
    .page-title {
      font-size: clamp(2rem, 7vw, 5rem);
      font-weight: 900; line-height: 0.9;
      letter-spacing: -0.045em; color: #fff; margin-bottom: 20px;
    }
    .page-title-yo {
      display: block;
      font-family: 'Flegrei', Georgia, serif; font-size: clamp(0.85rem, 2.5vw, 1.3rem);
      font-weight: normal; letter-spacing: 0.01em; color: var(--gold);
      margin-bottom: 4px;
    }
    .page-subtitle { font-size: 0.9rem; color: rgba(255,255,255,0.62); max-width: 340px; line-height: 1.65; margin-bottom: 22px; }

    /* ── APP LAYOUT ───────────────────────────────────────── */
    .app-outer { padding: clamp(24px, 4vw, 44px) var(--pad) 80px; }
    .app-layout {
      max-width: 1100px; margin: 0 auto;
      display: grid; grid-template-columns: 172px 1fr 172px;
      gap: 0 40px; align-items: start;
    }
    .app-center { min-width: 0; }

    /* ── SIDEBARS ─────────────────────────────────────────── */
    .cat-sidebar { position: sticky; top: 72px; display: flex; flex-direction: column; gap: 3px; }
    .cat-sidebar--left  { padding-top: 98px; }
    .cat-sidebar--right { padding-top: 115px; }

    .sidebar-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 10px; border-radius: 8px;
      border: 2px solid transparent; background: transparent; color: var(--ink-mid);
      font-family: var(--font); font-size: 0.66rem; font-weight: 700;
      letter-spacing: 0.03em; text-transform: uppercase;
      cursor: pointer; white-space: nowrap; transition: all var(--dur);
    }
    .sidebar-item:hover { border-color: rgba(15,130,122,0.45); color: var(--teal); background: rgba(15,130,122,0.06); }
    .sidebar-item.active { background: var(--ink); color: #fff; border-color: var(--ink); box-shadow: 3px 3px 0 var(--teal); }
    .sidebar-count { font-size: 0.58rem; font-weight: 800; padding: 1px 6px; border-radius: 999px; background: rgba(26,26,26,0.07); color: var(--ink-faint); }
    .sidebar-item.active .sidebar-count { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.7); }

    /* ── MOBILE CAT FAB ───────────────────────────────────── */
    .cat-fab-wrap {
      display: none; position: fixed; bottom: 24px; right: 14px; z-index: 250;
      flex-direction: column-reverse; align-items: flex-end; gap: 8px;
      pointer-events: none; /* wrapper is a large invisible box — only children opt back in */
    }
    .cat-fab {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: 999px;
      background: var(--ink); color: #fff; border: none;
      font-family: var(--font); font-size: 0.65rem; font-weight: 800;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; box-shadow: 3px 3px 0 var(--teal);
      pointer-events: auto; /* re-enable on the actual button */
    }
    .cat-fab-icon { font-size: 0.6rem; opacity: 0.7; transition: transform 240ms ease; display: inline-block; }
    .cat-fab-wrap.open .cat-fab-icon { transform: rotate(180deg); }
    .cat-dd-backdrop { display: none; position: fixed; inset: 0; z-index: 238; }
    .cat-dd-backdrop.open { display: block; }
    .cat-dropdown { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .cat-dd-item {
      display: block; padding: 8px 16px; border-radius: 999px;
      border: 2px solid var(--ink); background: var(--bg); color: var(--ink);
      font-family: var(--font); font-size: 0.66rem; font-weight: 800;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; white-space: nowrap; box-shadow: 2px 2px 0 var(--ink);
      transform: translateY(12px); opacity: 0; pointer-events: none;
      transition: transform 210ms ease, opacity 210ms ease;
    }
    .cat-dd-item:hover { background: var(--teal); color: #fff; border-color: var(--teal); }
    .cat-dd-item.active { background: var(--ink); color: #fff; }
    .cat-fab-wrap.open .cat-dd-item { transform: translateY(0); opacity: 1; pointer-events: auto; }

    @media (max-width: 959px) {
      .app-layout { grid-template-columns: 1fr; max-width: 540px; }
      .cat-sidebar { display: none; }
      .cat-fab-wrap { display: flex; }
    }

    @media (max-width: 640px) {
      .quiz-opt { font-size: 1.35rem; padding: 22px 14px; }
      /* browse nav btn override handled below */
      .btn-quiz-next { font-size: 0.95rem; padding: 20px; }
      .quiz-prompt { font-size: clamp(1.9rem, 6.5vw, 3rem); }
      .mode-tab { padding: 18px 20px; font-size: 0.82rem; }
      /* Tighter header on mobile */
      .page-header { padding-top: 22px; padding-bottom: 18px; }
      .page-title { margin-bottom: 12px; }
      .page-subtitle { font-size: 0.82rem; margin-bottom: 14px; }
      /* Tighter app chrome */
      .app-outer { padding-top: 20px; }
      .mode-tabs { margin-bottom: 16px; }
      .quiz-meta { margin-bottom: 12px; }
      .progress-wrap { margin-bottom: 14px; }
      /* Bigger "I know this" tap target */
      .card-know-btn { padding: 10px 22px; font-size: 1.1rem; }
    }

    /* ── MODE TABS ────────────────────────────────────────── */
    .mode-tabs {
      display: flex; border: 2.5px solid var(--ink);
      border-radius: 14px; overflow: hidden;
      margin-bottom: 24px; box-shadow: var(--shadow-sm);
    }
    .mode-tab {
      flex: 1; font-family: var(--font);
      font-size: 0.75rem; font-weight: 800; letter-spacing: 0.09em; text-transform: uppercase;
      padding: 13px 20px; border: none; cursor: pointer;
      background: var(--surface); color: var(--ink-mid); transition: all var(--dur);
    }
    .mode-tab:first-child { border-right: 2.5px solid var(--ink); }
    .mode-tab.active { background: var(--ink); color: #fff; }
    @media (hover: hover) { .mode-tab:hover:not(.active) { background: rgba(26,26,26,0.04); color: var(--ink); } }
    .mode-tab:active:not(.active) { background: rgba(26,26,26,0.1); color: var(--ink); }

    .panel { display: none; }
    .panel.active { display: block; }

    /* ── BROWSE CARD ──────────────────────────────────────── */
    .browse-perspective { perspective: 1200px; margin-bottom: 18px; }
    .browse-card {
      position: relative; width: 100%;
      height: clamp(420px, 70vh, 520px);
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .browse-card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute; inset: 0; border-radius: 18px;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border: 3px solid var(--ink); padding: 20px 24px;
      display: flex; flex-direction: column;
    }
    /* card-front uses flex column with space distribution */
    .card-front { background: var(--teal); box-shadow: var(--shadow-lg); justify-content: space-between; text-align: center; }
    .card-front-meta { position: absolute; top: clamp(20px, 3.5vw, 32px); right: clamp(22px, 4vw, 36px); }
    .card-cat-badge { font-size: 0.75rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.28); text-align: center; }
    .card-seen-tag { font-size: 0.62rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 10px; border-radius: 999px; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); border: 1.5px solid rgba(255,255,255,0.35); align-self: center; margin-top: 4px; }
    /* Teal overrides for quiz-prog-row when inside card-front */
    .card-front .quiz-prog-row { margin-bottom: 0; }
    .card-front .quiz-q-num { color: rgba(255,255,255,0.6); }
    .card-front .quiz-prog-track { background: rgba(255,255,255,0.2); }
    .card-front .quiz-prog-fill { background: rgba(255,255,255,0.75); }
    .card-word-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
    .card-word { font-weight: 900; font-size: clamp(2.8rem, 10vw, 5.8rem); color: #fff; line-height: 0.95; letter-spacing: -0.03em; word-break: break-word; max-width: 100%; }
    .card-front-footer { display: flex; justify-content: flex-end; align-items: center; flex-shrink: 0; }
    .card-reveal-hint { font-size: 0.75rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.28); }
    .card-swipe-hint { display: none; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.2); margin-top: 6px; }
    @media (max-width: 640px) { .card-swipe-hint { display: block; } }
    .card-know-btn { font-family: var(--font); font-size: 1rem; font-weight: 800; padding: 8px 20px; border-radius: 999px; border: 1.5px solid rgba(255,255,255,0.45); background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.82); cursor: pointer; transition: background var(--dur), border-color var(--dur); z-index: 2; }
    @media (hover: hover) { .card-know-btn:hover { background: rgba(255,255,255,0.28); border-color: rgba(255,255,255,0.7); } }
    .card-know-btn:active { background: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.8); }
    .card-back { transform: rotateY(180deg); background: var(--surface); box-shadow: var(--shadow-lg); justify-content: center; align-items: center; text-align: center; gap: 0; }
    .card-meaning { font-weight: 900; font-size: clamp(2rem, 8vw, 4.2rem); color: var(--ink); line-height: 0.95; letter-spacing: -0.035em; margin-bottom: 14px; }
    .card-example-yo { font-size: 1.35rem; color: var(--teal); font-style: normal; line-height: 1.4; padding-top: 10px; border-top: 2px solid rgba(15,130,122,0.15); margin-bottom: 2px; }
    .card-example-en { font-size: 1.15rem; color: var(--ink-mid); line-height: 1.4; margin-top: -4px; }

    /* ── BROWSE NAV ───────────────────────────────────────── */
    .browse-nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 16px; }
    .btn-nav { font-family: var(--font); font-size: 1.3rem; font-weight: 800; letter-spacing: 0.04em; padding: 26px 0; flex: 1; border-radius: 999px; border: 2.5px solid var(--ink); background: var(--surface); color: var(--ink); cursor: pointer; transition: background var(--dur), color var(--dur), box-shadow var(--dur), transform var(--dur); box-shadow: var(--shadow-sm); }
    @media (hover: hover) {
      .btn-nav:hover:not(:disabled) { background: var(--ink); color: #fff; box-shadow: none; transform: translate(3px, 3px); }
    }
    .btn-nav:active:not(:disabled) { background: var(--ink); color: #fff; box-shadow: none; transform: translate(3px, 3px); }
    .btn-nav:disabled { opacity: 0.25; cursor: not-allowed; box-shadow: none; }
    .btn-nav-primary { background: var(--teal); border-color: var(--teal); color: #fff; }
    .btn-nav-primary:hover:not(:disabled) { background: var(--teal-deep); border-color: var(--teal-deep); }
    .browse-counter { font-size: 0.7rem; font-weight: 800; letter-spacing: 0.05em; color: var(--ink-mid); text-align: center; flex-shrink: 0; }

    /* ── QUIZ ─────────────────────────────────────────────── */
    .quiz-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .quiz-score { position: absolute; bottom: 20px; left: 24px; font-size: 0.8rem; font-weight: 700; color: var(--ink-mid); }
    .quiz-score strong { color: var(--teal); font-size: 1.05rem; font-weight: 900; }
    .btn-reset { position: absolute; bottom: 20px; right: 24px; font-family: var(--font); font-size: 1rem; font-weight: 800; padding: 8px 20px; border-radius: 999px; border: 1.5px solid rgba(26,26,26,0.35); background: rgba(26,26,26,0.1); color: rgba(26,26,26,0.7); cursor: pointer; transition: background var(--dur), border-color var(--dur); z-index: 2; }
    @media (hover: hover) { .btn-reset:hover { background: rgba(26,26,26,0.2); border-color: rgba(26,26,26,0.6); } }
    .btn-reset:active { background: rgba(26,26,26,0.25); }
    .quiz-card { background: var(--gold); border: 3px solid var(--ink); border-radius: 18px; padding: 20px 24px; text-align: center; box-shadow: var(--shadow-lg); height: clamp(420px, 70vh, 520px); display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
    .quiz-instruction { font-size: 0.75rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(26,26,26,0.42); margin-bottom: 24px; }
    .quiz-prompt { font-size: clamp(1.6rem, 5.5vw, 2.6rem); font-weight: 900; color: var(--ink); line-height: 1.1; margin-bottom: 28px; letter-spacing: -0.03em; }
    .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex: 1; align-content: start; }
    @media (max-width: 480px) { .quiz-options { grid-template-columns: 1fr; } }
    .quiz-opt { font-family: var(--font); font-size: 1rem; font-weight: 800; padding: 18px 14px; border-radius: 12px; border: 2.5px solid var(--ink); background: var(--surface); color: var(--ink); cursor: pointer; text-align: center; line-height: 1.3; transition: background var(--dur), color var(--dur), border-color var(--dur), box-shadow var(--dur); box-shadow: 3px 3px 0 var(--ink); }
    @media (hover: hover) {
      .quiz-opt:hover:not(:disabled) { background: var(--ink); color: #fff; box-shadow: none; transform: translate(3px, 3px); }
    }
    .quiz-opt:active:not(:disabled) { background: var(--ink); color: #fff; box-shadow: none; transform: translate(3px, 3px); }
    .quiz-opt.correct { background: var(--teal); border-color: var(--teal-deep); color: #fff; box-shadow: 3px 3px 0 var(--teal-deep); }
    .quiz-opt.wrong   { background: var(--coral); border-color: var(--coral-deep); color: #fff; box-shadow: 3px 3px 0 var(--coral-deep); }
    .quiz-opt.dim     { background: rgba(255,255,255,0.35); border-color: rgba(26,26,26,0.12); color: rgba(26,26,26,0.32); box-shadow: none; }
    .quiz-opt:disabled { cursor: default; }
    @media (hover: hover) {
      .btn-quiz-next:hover { background: var(--teal-deep); box-shadow: none; transform: translate(3px, 3px); }
    }
    .btn-quiz-next:active { background: var(--teal-deep); box-shadow: none; transform: translate(3px, 3px); }
    .quiz-done { text-align: center; padding: clamp(28px, 5vw, 44px) 16px clamp(24px, 4vw, 32px); }
    .quiz-done-glyph { font-size: clamp(2.2rem, 6vw, 3.5rem); font-weight: 900; color: var(--ink); margin-bottom: 10px; letter-spacing: -0.04em; }
    .quiz-done-title { font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 900; color: var(--ink); margin-bottom: 8px; letter-spacing: -0.04em; }
    .quiz-done-sub { font-size: 0.9rem; color: rgba(26,26,26,0.55); margin-bottom: 28px; line-height: 1.5; }

    /* ── QUIZ PROGRESS ROW ───────────────────────────────────── */
    .quiz-prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .quiz-q-num { font-size: 0.62rem; font-weight: 800; letter-spacing: 0.08em; color: rgba(26,26,26,0.45); white-space: nowrap; }
    .quiz-prog-track { flex: 1; height: 5px; background: rgba(26,26,26,0.18); border-radius: 99px; overflow: hidden; }
    .quiz-prog-fill { height: 100%; background: var(--ink); border-radius: 99px; transition: width 0.4s var(--ease); width: 0%; }

    /* ── QUIZ ANIMATIONS ─────────────────────────────────────── */

    @keyframes opt-correct-pop {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }
    @keyframes opt-wrong-shake {
      0%, 100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      60%      { transform: translateX(6px); }
      80%      { transform: translateX(-3px); }
    }
    .quiz-opt.correct.anim { animation: opt-correct-pop 320ms ease both; }
    .quiz-opt.wrong.anim   { animation: opt-wrong-shake 280ms ease both; }
    /* desktop: compact nav buttons */
    @media (min-width: 641px) {
      .btn-nav { font-size: 0.7rem; padding: 11px 24px; flex: 0 0 auto; }
    }
    /* mobile: swipe replaces prev/next buttons */
    @media (max-width: 640px) {
      .browse-nav { display: none; }
    }
  </style>
</head>

<script>
/* ════════════════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════════════════ */
var allWords   = [];
var filtered   = [];
var activeMode = 'browse';
var activeCat  = 'all';

var bIndex   = 0;
var bFlipped = false;

var qCorrect  = 0;
var qTotal    = 0;
var qOrder    = [];
var qCursor   = 0;
var qAnswered = false;
var qHistory  = [];

var STORAGE_SEEN = 'yfl-100-seen';
var STORAGE_POS  = 'yfl-100-pos';
var seenIds = new Set();

/* ════════════════════════════════════════════════════════
   PERSISTENCE
   ════════════════════════════════════════════════════════ */
function loadSeen() {
  try { JSON.parse(localStorage.getItem(STORAGE_SEEN) || '[]').forEach(function(id){ seenIds.add(id); }); } catch(e){}
}
function saveSeen() {
  try { localStorage.setItem(STORAGE_SEEN, JSON.stringify(Array.from(seenIds))); } catch(e){}
}
function loadPos(cat) {
  try { var raw = JSON.parse(localStorage.getItem(STORAGE_POS) || '{}'); return typeof raw[cat] === 'number' ? raw[cat] : 0; } catch(e){ return 0; }
}
function savePos(cat, idx) {
  try { var raw = JSON.parse(localStorage.getItem(STORAGE_POS) || '{}'); raw[cat] = idx; localStorage.setItem(STORAGE_POS, JSON.stringify(raw)); } catch(e){}
}

/* ════════════════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════════════════ */
var CATS = ['Greetings','Family','Food & Drink','Body','Time','Places','Nature','Verbs','Adjectives','Concepts'];

function init(words) {
  allWords = words;
  loadSeen();
  buildCatSidebars();
  buildCatDropdown();
  setCategory('all');
  bindEvents();
}

function buildCatSidebars() {
  var allItems = [{ cat: 'all', label: 'All', n: allWords.length }];
  CATS.forEach(function(cat) {
    var n = allWords.filter(function(w){ return w.category === cat; }).length;
    allItems.push({ cat: cat, label: cat, n: n });
  });

  function makeBtn(item) {
    var btn = document.createElement('button');
    btn.className = 'sidebar-item'; btn.dataset.cat = item.cat;
    btn.innerHTML = '<span>' + item.label + '</span><span class="sidebar-count">' + item.n + '</span>';
    return btn;
  }

  var left  = document.getElementById('sidebar-left');
  var right = document.getElementById('sidebar-right');
  allItems.slice(0, 6).forEach(function(item){ left.appendChild(makeBtn(item)); });
  allItems.slice(6).forEach(function(item){ right.appendChild(makeBtn(item)); });
}

function buildCatDropdown() {
  var allItems = [{ cat: 'all', label: 'All 100' }];
  CATS.forEach(function(cat){ allItems.push({ cat: cat, label: cat }); });
  var dropdown = document.getElementById('cat-dropdown');
  allItems.forEach(function(item) {
    var btn = document.createElement('button');
    btn.className = 'cat-dd-item'; btn.dataset.cat = item.cat; btn.textContent = item.label;
    dropdown.appendChild(btn);
  });
}

/* ════════════════════════════════════════════════════════
   CATEGORY
   ════════════════════════════════════════════════════════ */
function setCategory(cat) {
  activeCat = cat;
  filtered  = cat === 'all' ? allWords.slice() : allWords.filter(function(w){ return w.category === cat; });
  document.querySelectorAll('.sidebar-item').forEach(function(b){ b.classList.toggle('active', b.dataset.cat === cat); });
  document.querySelectorAll('.cat-dd-item').forEach(function(b){ b.classList.toggle('active', b.dataset.cat === cat); });
  var fabLabel = document.getElementById('cat-fab-label');
  if (fabLabel) fabLabel.textContent = cat === 'all' ? 'All' : cat;
  bIndex   = Math.min(loadPos(cat), filtered.length - 1);
  bFlipped = false;
  renderBrowse();
  if (activeMode === 'quiz') startQuiz();
}

function openCatFab()  { document.getElementById('cat-fab-wrap').classList.add('open');    document.getElementById('cat-dd-backdrop').classList.add('open'); }
function closeCatFab() { document.getElementById('cat-fab-wrap').classList.remove('open'); document.getElementById('cat-dd-backdrop').classList.remove('open'); }

/* ════════════════════════════════════════════════════════
   BROWSE
   ════════════════════════════════════════════════════════ */
function renderBrowse() {
  if (!filtered.length) return;
  var w = filtered[bIndex];
  document.getElementById('f-word').textContent    = w.yoruba;
  document.getElementById('f-cat').textContent     = w.category;
  document.getElementById('b-meaning').textContent = w.meaning;
  document.getElementById('b-sent-yo').textContent = w.sent_yo;
  document.getElementById('b-sent-en').textContent = w.sent_en;
  document.getElementById('f-seen').style.display  = seenIds.has(w.id) ? '' : 'none';
  document.getElementById('b-num').textContent = (bIndex + 1) + ' / ' + filtered.length;
  document.getElementById('btn-prev').disabled = bIndex === 0;
  document.getElementById('btn-next').disabled = bIndex === filtered.length - 1;
  updateBrowseProgress();
  var card = document.getElementById('browse-card');
  bFlipped = false;
  if (card.classList.contains('flipped')) {
    card.style.transition = 'none'; card.classList.remove('flipped');
    requestAnimationFrame(function(){ requestAnimationFrame(function(){ card.style.transition = ''; }); });
  }
}

function updateBrowseProgress() {
  var seen  = filtered.filter(function(w){ return seenIds.has(w.id); }).length;
  var total = filtered.length, pct = total ? (seen / total * 100) : 0;
  document.getElementById('b-prog-fill').style.width = pct + '%';
}


function flipCard() {
  var card = document.getElementById('browse-card');
  bFlipped = !bFlipped; card.classList.toggle('flipped', bFlipped);
  if (bFlipped && filtered.length) {
    var w = filtered[bIndex];
    if (!seenIds.has(w.id)) {
      seenIds.add(w.id); saveSeen();
      document.getElementById('f-seen').style.display = '';
      updateBrowseProgress();
    }
  }
}

function navBrowse(dir) {
  var next = bIndex + dir;
  if (next < 0 || next >= filtered.length) return;
  var card = document.getElementById('browse-card'), wasFlipped = bFlipped;
  if (bFlipped) { card.style.transition = 'none'; card.classList.remove('flipped'); bFlipped = false; }
  function doSwap() { bIndex = next; savePos(activeCat, bIndex); renderBrowse(); }
  if (wasFlipped) {
    var outA = dir > 0 ? 'rotateY(90deg)' : 'rotateY(-90deg)', inA = dir > 0 ? 'rotateY(-90deg)' : 'rotateY(90deg)';
    card.style.transition = 'transform 170ms ease-in'; card.style.transform = outA;
    setTimeout(function(){ doSwap(); card.style.transition = 'none'; card.style.transform = inA;
      requestAnimationFrame(function(){ requestAnimationFrame(function(){ card.style.transition = 'transform 170ms ease-out'; card.style.transform = ''; }); }); }, 175);
  } else {
    var outX = dir > 0 ? '52px' : '-52px', inX = dir > 0 ? '-52px' : '52px';
    card.style.transition = 'transform 150ms ease-in, opacity 150ms ease-in';
    card.style.transform = 'translateX(' + outX + ')'; card.style.opacity = '0';
    setTimeout(function(){ doSwap(); card.style.transition = 'none'; card.style.transform = 'translateX(' + inX + ')'; card.style.opacity = '0';
      requestAnimationFrame(function(){ requestAnimationFrame(function(){ card.style.transition = 'transform 150ms ease-out, opacity 150ms ease-out'; card.style.transform = ''; card.style.opacity = ''; }); }); }, 155);
  }
}

function markKnown(e) {
  e.stopPropagation();
  if (!filtered.length) return;
  var w = filtered[bIndex];
  if (!seenIds.has(w.id)) { seenIds.add(w.id); saveSeen(); updateBrowseProgress(); }
  if (bIndex < filtered.length - 1) navBrowse(1);
  else document.getElementById('f-seen').style.display = '';
}

/* ════════════════════════════════════════════════════════
   QUIZ
   ════════════════════════════════════════════════════════ */
function shuffle(a) {
  var arr = a.slice();
  for (var i = arr.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)), t = arr[i]; arr[i] = arr[j]; arr[j] = t; }
  return arr;
}

function startQuiz() {
  qCorrect = 0; qTotal = 0; qAnswered = false; qHistory = [];
  qOrder = shuffle(filtered.map(function(_, i){ return i; })); qCursor = 0;
  updateQuizScore();
  document.getElementById('quiz-card').style.display = '';
  document.getElementById('quiz-done-screen').style.display = 'none';
  document.getElementById('q-num').textContent = '1 / ' + qOrder.length;
  document.getElementById('q-prog-fill').style.width = '0%';
  renderQuiz();
}

function getDistractors(word, count) {
  var same   = allWords.filter(function(w){ return w.category === word.category && w.id !== word.id; });
  var others = allWords.filter(function(w){ return w.category !== word.category; });
  var pool   = shuffle(same.concat(others)), seen = new Set([word.yoruba]), result = [];
  for (var i = 0; i < pool.length && result.length < count; i++) {
    if (!seen.has(pool[i].yoruba)) { seen.add(pool[i].yoruba); result.push(pool[i]); }
  }
  return result;
}

function renderQuiz() {
  var btnPrev = document.getElementById('btn-qprev');
  var btnNext = document.getElementById('btn-quiz-next');
  if (qCursor >= qOrder.length) {
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('quiz-done-screen').style.display = '';
    document.getElementById('quiz-done-sub').textContent = qCorrect + ' correct out of ' + qTotal + ' · ' + filtered.length + ' words';
    btnPrev.disabled = (qHistory.length === 0);
    btnNext.disabled = true; return;
  }
  document.getElementById('quiz-card').style.display = '';
  document.getElementById('quiz-done-screen').style.display = 'none';
  /* Progress counter + bar */
  document.getElementById('q-num').textContent = (qCursor + 1) + ' / ' + qOrder.length;
  document.getElementById('q-prog-fill').style.width = (qCursor / qOrder.length * 100) + '%';
  /* Entrance animation */
  var qCard = document.getElementById('quiz-card');
  var word = filtered[qOrder[qCursor]], alreadyAnswered = qCursor < qHistory.length, options;
  if (alreadyAnswered) { options = qHistory[qCursor].options; qAnswered = true; }
  else { options = shuffle([word].concat(getDistractors(word, 3))); qAnswered = false; }
  document.getElementById('q-prompt').textContent = word.meaning;
  var optEl = document.getElementById('q-options'); optEl.innerHTML = '';
  options.forEach(function(opt) {
    var btn = document.createElement('button'); btn.className = 'quiz-opt';
    btn.textContent = opt.yoruba; btn.dataset.id = String(opt.id);
    if (alreadyAnswered) {
      btn.disabled = true; var h = qHistory[qCursor];
      if (opt.id === h.correctId) btn.classList.add('correct');
      else if (opt.id === h.selectedId) btn.classList.add('wrong');
      else btn.classList.add('dim');
    } else { btn.addEventListener('click', function(){ selectOpt(opt.id, word.id, options); }); }
    optEl.appendChild(btn);
  });
  btnNext.disabled = !alreadyAnswered;
  btnPrev.disabled = (qCursor === 0);
}

function selectOpt(selectedId, correctId, options) {
  if (qAnswered) return; qAnswered = true;
  qHistory.push({ selectedId: selectedId, correctId: correctId, options: options });
  qTotal++; if (selectedId === correctId) qCorrect++;
  updateQuizScore();
  document.querySelectorAll('.quiz-opt').forEach(function(btn) {
    btn.disabled = true; var id = parseInt(btn.dataset.id, 10);
    if (id === correctId) { btn.classList.add('correct'); btn.classList.add('anim'); }
    else if (id === selectedId) { btn.classList.add('wrong'); btn.classList.add('anim'); }
    else btn.classList.add('dim');
  });
  var btnNext = document.getElementById('btn-quiz-next');
  btnNext.disabled = false;
  document.getElementById('btn-qprev').disabled = (qCursor === 0);
}

function advanceQuiz()  { if (!qAnswered) return; qCursor++; renderQuiz(); }
function retreatQuiz()  { if (qCursor > 0) { qCursor--; renderQuiz(); } }
function updateQuizScore() { document.getElementById('q-score').innerHTML = '<strong>' + qCorrect + '</strong> / ' + qTotal; }

/* ════════════════════════════════════════════════════════
   EVENTS
   ════════════════════════════════════════════════════════ */
function bindEvents() {
  document.getElementById('tab-browse').addEventListener('click', function() {
    if (activeMode === 'browse') return; activeMode = 'browse';
    document.getElementById('tab-browse').classList.add('active'); document.getElementById('tab-quiz').classList.remove('active');
    document.getElementById('panel-browse').classList.add('active'); document.getElementById('panel-quiz').classList.remove('active');
  });
  document.getElementById('tab-quiz').addEventListener('click', function() {
    if (activeMode === 'quiz') return; activeMode = 'quiz';
    document.getElementById('tab-quiz').classList.add('active'); document.getElementById('tab-browse').classList.remove('active');
    document.getElementById('panel-quiz').classList.add('active'); document.getElementById('panel-browse').classList.remove('active');
    startQuiz();
  });
  document.getElementById('sidebar-left').addEventListener('click', function(e) { var b = e.target.closest('.sidebar-item'); if (b) setCategory(b.dataset.cat); });
  document.getElementById('sidebar-right').addEventListener('click', function(e) { var b = e.target.closest('.sidebar-item'); if (b) setCategory(b.dataset.cat); });
  document.getElementById('cat-fab').addEventListener('click', function(e) { e.stopPropagation(); document.getElementById('cat-fab-wrap').classList.contains('open') ? closeCatFab() : openCatFab(); });
  document.getElementById('cat-dropdown').addEventListener('click', function(e) { var b = e.target.closest('.cat-dd-item'); if (b) { setCategory(b.dataset.cat); closeCatFab(); } });
  document.getElementById('cat-dd-backdrop').addEventListener('click', closeCatFab);
  document.getElementById('browse-card').addEventListener('click', function(e) { if (e.target.closest('.card-know-btn')) return; flipCard(); });
  document.getElementById('btn-prev').addEventListener('click', function(e) { e.stopPropagation(); navBrowse(-1); });
  document.getElementById('btn-next').addEventListener('click', function(e) { e.stopPropagation(); navBrowse(1); });
  document.getElementById('btn-know').addEventListener('click', markKnown);
  document.getElementById('btn-reset').addEventListener('click', startQuiz);
  document.getElementById('btn-quiz-again').addEventListener('click', startQuiz);
  document.getElementById('btn-quiz-next').addEventListener('click', advanceQuiz);
  document.getElementById('btn-qprev').addEventListener('click', retreatQuiz);

  /* ── SWIPE GESTURES ───────────────────────────────── */
  (function () {
    var THRESHOLD = 72, FLY_MS = 220, SNAP_MS = 300;

    function swipeable(touchEl, dragEl, opts) {
      var sx, sy, active = false;

      touchEl.addEventListener('touchstart', function (e) {
        if (opts.ignore && opts.ignore(e.target)) return;
        sx = e.touches[0].clientX; sy = e.touches[0].clientY;
        active = true; dragEl.style.transition = 'none';
      }, { passive: true });

      touchEl.addEventListener('touchmove', function (e) {
        if (!active) return;
        var dx = e.touches[0].clientX - sx, dy = e.touches[0].clientY - sy;
        if (Math.abs(dx) > Math.abs(dy)) {
          e.preventDefault();
          dragEl.style.transform = 'translateX(' + dx + 'px) rotate(' + (dx * 0.04) + 'deg)';
        }
      }, { passive: false });

      function snapBack() {
        requestAnimationFrame(function () { requestAnimationFrame(function () {
          dragEl.style.transition = 'transform ' + SNAP_MS + 'ms cubic-bezier(.25,.46,.45,.94)';
          dragEl.style.transform  = '';
          setTimeout(function () { dragEl.style.transition = ''; }, SNAP_MS + 20);
        }); });
      }

      function slideIn(fromRight) {
        dragEl.style.transition = 'none';
        dragEl.style.transform  = 'translateX(' + (fromRight ? '40px' : '-40px') + ')';
        dragEl.style.opacity    = '0';
        requestAnimationFrame(function () { requestAnimationFrame(function () {
          dragEl.style.transition = 'transform 200ms ease-out, opacity 180ms ease-out';
          dragEl.style.transform  = '';
          dragEl.style.opacity    = '';
          setTimeout(function () { dragEl.style.transition = ''; }, 220);
        }); });
      }

      touchEl.addEventListener('touchend', function (e) {
        if (!active) return; active = false;
        var dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
        var isLeft = dx < 0, dist = Math.abs(dx);
        if (dist <= THRESHOLD || dist <= Math.abs(dy) * 1.2) { snapBack(); return; }
        var can = isLeft ? (!opts.canLeft || opts.canLeft()) : (!opts.canRight || opts.canRight());
        if (!can) { snapBack(); return; }
        var flyX = isLeft ? '-115%' : '115%', flyR = isLeft ? '-16deg' : '16deg';
        dragEl.style.transition = 'transform ' + FLY_MS + 'ms ease-in, opacity ' + (FLY_MS - 30) + 'ms ease-in';
        dragEl.style.transform  = 'translateX(' + flyX + ') rotate(' + flyR + ')';
        dragEl.style.opacity    = '0';
        setTimeout(function () {
          dragEl.style.transition = 'none';
          dragEl.style.opacity    = '';
          dragEl.style.transform  = '';
          if (isLeft) opts.onLeft && opts.onLeft();
          else        opts.onRight && opts.onRight();
          slideIn(isLeft);
        }, FLY_MS);
      }, { passive: true });
    }

    /* Browse */
    var browsePersp = document.querySelector('.browse-perspective');
    var browseCard  = document.getElementById('browse-card');
    if (browsePersp && browseCard) {
      swipeable(browseCard, browsePersp, {
        canLeft:  function () { return bIndex < filtered.length - 1; },
        canRight: function () { return bIndex > 0; },
        onLeft: function () {
          bIndex++; bFlipped = false; browseCard.classList.remove('flipped');
          savePos(activeCat, bIndex); renderBrowse();
        },
        onRight: function () {
          bIndex--; bFlipped = false; browseCard.classList.remove('flipped');
          savePos(activeCat, bIndex); renderBrowse();
        }
      });
    }

    /* Quiz */
    var quizCard = document.getElementById('quiz-card');
    if (quizCard) {
      swipeable(quizCard, quizCard, {
        canLeft:  function () { return !!qAnswered; },
        canRight: function () { return qCursor > 0; },
        onLeft:  function () { advanceQuiz(); },
        onRight: function () { retreatQuiz(); },
        ignore:  function (t) { return !!t.closest('.quiz-opt, .btn-reset'); }
      });
    }
  })();
}

fetch('./yoruba-100.json')
  .then(r => r.json())
  .then(words => init(words))
  .catch(() => {
