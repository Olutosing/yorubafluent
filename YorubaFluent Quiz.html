<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YorubaFluent — 100 Words</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">

  <style>
    /* ── TOKENS ───────────────────────────────────────────── */
    :root {
      --teal:       #0F827A;
      --teal-deep:  #0A5C56;
      --coral:      #E07A5F;
      --coral-deep: #C45E44;
      --gold:       #FFB300;
      --gold-deep:  #CC8F00;
      --ink:        #1A1A1A;
      --ink-mid:    #636363;
      --ink-faint:  #ABABAB;
      --bg:         #F5F2EC;
      --surface:    #FFFFFF;
      --shadow-sm:  3px 3px 0 #1A1A1A;
      --shadow-md:  5px 5px 0 #1A1A1A;
      --shadow-lg:  8px 8px 0 #1A1A1A;
      --font:       'Plus Jakarta Sans', sans-serif;
      --ease:       cubic-bezier(0.4, 0, 0.2, 1);
      --dur:        140ms;
      --pad:        clamp(16px, 5vw, 60px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ──────────────────────────────────────────────── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--ink);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--pad); height: 52px;
    }
    .nav-logo {
      font-size: 1.05rem; font-weight: 900; letter-spacing: -0.03em;
      color: #fff; text-decoration: none; display: flex; align-items: baseline; gap: 1px;
    }
    .nav-logo-accent { color: var(--gold); }
    .pill-nav { display: flex; gap: 8px; }
    .pill {
      font-size: 0.6rem; font-weight: 800; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 6px 14px; border-radius: 999px;
      text-decoration: none; border: 1.5px solid rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.6); transition: all var(--dur);
    }
    .pill:hover { border-color: #fff; color: #fff; }
    .pill-home { background: var(--coral); border-color: var(--coral); color: #fff; }

    /* ── PAGE HEADER ──────────────────────────────────────── */
    .page-header {
      background: var(--teal);
      padding: clamp(32px, 5vw, 56px) var(--pad) clamp(28px, 4vw, 48px);
      position: relative; overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute; right: -80px; top: -100px;
      width: 460px; height: 460px; border-radius: 50%;
      border: 52px solid rgba(255,255,255,0.05);
      pointer-events: none;
    }
    .page-header::after {
      content: '';
      position: absolute; right: 80px; bottom: -60px;
      width: 180px; height: 180px; border-radius: 50%;
      border: 28px solid rgba(255,255,255,0.04);
      pointer-events: none;
    }
    .page-header-inner {
      max-width: 1100px; margin: 0 auto;
      position: relative; z-index: 1;
    }
    .page-title {
      font-size: clamp(4.2rem, 15vw, 10.5rem);
      font-weight: 900; line-height: 0.84;
      letter-spacing: -0.045em; color: #fff;
      margin-bottom: 20px;
    }
    .page-subtitle {
      font-size: 0.9rem; color: rgba(255,255,255,0.62);
      max-width: 340px; line-height: 1.65; margin-bottom: 22px;
    }
    .stat-chip {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.64rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 6px 14px; border-radius: 999px;
      background: var(--gold); color: var(--ink);
      border: 2px solid var(--ink);
    }

    /* ── APP LAYOUT ───────────────────────────────────────── */
    .app-outer { padding: clamp(24px, 4vw, 44px) var(--pad) 80px; }
    .app-layout {
      max-width: 1100px; margin: 0 auto;
      display: grid;
      grid-template-columns: 172px 1fr 172px;
      gap: 0 40px; align-items: start;
    }
    .app-center { min-width: 0; }

    /* ── SIDEBARS ─────────────────────────────────────────── */
    .cat-sidebar {
      position: sticky; top: 72px;
      display: flex; flex-direction: column; gap: 3px;
    }
    .cat-sidebar--left  { padding-top: 98px; }
    .cat-sidebar--right { padding-top: 115px; }

    .sidebar-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 10px; border-radius: 8px;
      border: 2px solid transparent;
      background: transparent; color: var(--ink-mid);
      font-family: var(--font);
      font-size: 0.66rem; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase;
      cursor: pointer; white-space: nowrap; transition: all var(--dur);
    }
    .sidebar-item:hover {
      border-color: rgba(15,130,122,0.45); color: var(--teal);
      background: rgba(15,130,122,0.06);
    }
    .sidebar-item.active {
      background: var(--ink); color: #fff; border-color: var(--ink);
      box-shadow: 3px 3px 0 var(--teal);
    }
    .sidebar-count {
      font-size: 0.58rem; font-weight: 800;
      padding: 1px 6px; border-radius: 999px;
      background: rgba(26,26,26,0.07); color: var(--ink-faint);
    }
    .sidebar-item.active .sidebar-count {
      background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.7);
    }

    /* ── MOBILE CAT FAB ───────────────────────────────────── */
    .cat-fab-wrap {
      display: none; position: fixed; top: 66px; right: 14px; z-index: 250;
      flex-direction: column; align-items: flex-end; gap: 8px;
    }
    .cat-fab {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: 999px;
      background: var(--ink); color: #fff; border: none;
      font-family: var(--font);
      font-size: 0.65rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; box-shadow: 3px 3px 0 var(--teal);
    }
    .cat-fab-icon {
      font-size: 0.6rem; opacity: 0.7;
      transition: transform 240ms ease; display: inline-block;
    }
    .cat-fab-wrap.open .cat-fab-icon { transform: rotate(180deg); }
    .cat-dd-backdrop { display: none; position: fixed; inset: 0; z-index: 238; }
    .cat-dd-backdrop.open { display: block; }
    .cat-dropdown { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .cat-dd-item {
      display: block; padding: 8px 16px; border-radius: 999px;
      border: 2px solid var(--ink); background: var(--bg); color: var(--ink);
      font-family: var(--font);
      font-size: 0.66rem; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; white-space: nowrap;
      box-shadow: 2px 2px 0 var(--ink);
      transform: translateY(-12px); opacity: 0; pointer-events: none;
      transition: transform 210ms ease, opacity 210ms ease;
    }
    .cat-dd-item:hover { background: var(--teal); color: #fff; border-color: var(--teal); }
    .cat-dd-item.active { background: var(--ink); color: #fff; }
    .cat-fab-wrap.open .cat-dd-item { transform: translateY(0); opacity: 1; pointer-events: auto; }

    @media (max-width: 959px) {
      .app-layout { grid-template-columns: 1fr; max-width: 540px; }
      .cat-sidebar { display: none; }
      .cat-fab-wrap { display: flex; }
    }

    /* ── MODE TABS ────────────────────────────────────────── */
    .mode-tabs {
      display: flex;
      border: 2.5px solid var(--ink);
      border-radius: 14px; overflow: hidden;
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
    }
    .mode-tab {
      flex: 1;
      font-family: var(--font);
      font-size: 0.75rem; font-weight: 800; letter-spacing: 0.09em; text-transform: uppercase;
      padding: 13px 20px; border: none; cursor: pointer;
      background: var(--surface); color: var(--ink-mid);
      transition: all var(--dur);
    }
    .mode-tab:first-child { border-right: 2.5px solid var(--ink); }
    .mode-tab.active { background: var(--ink); color: #fff; }
    .mode-tab:hover:not(.active) { background: rgba(26,26,26,0.04); color: var(--ink); }

    .panel { display: none; }
    .panel.active { display: block; }

    /* ── PROGRESS ─────────────────────────────────────────── */
    .progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .progress-track {
      flex: 1; height: 7px;
      background: rgba(26,26,26,0.09);
      border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--teal);
      border-radius: 99px; transition: width 0.5s var(--ease); width: 0%;
    }
    .progress-fill.complete { background: var(--gold); }
    .progress-label {
      font-size: 0.67rem; font-weight: 800; letter-spacing: 0.05em;
      color: var(--ink-mid); white-space: nowrap; min-width: 64px; text-align: right;
    }
    .progress-label.complete { color: var(--gold-deep); }

    /* ── BROWSE CARD ──────────────────────────────────────── */
    .browse-perspective { perspective: 1200px; margin-bottom: 18px; }
    .browse-card {
      position: relative; width: 100%;
      height: clamp(300px, 44vw, 440px);
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .browse-card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute; inset: 0; border-radius: 18px;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border: 3px solid var(--ink);
      padding: 24px 28px;
      display: flex; flex-direction: column;
    }

    .card-front {
      background: var(--teal);
      box-shadow: var(--shadow-lg);
      align-items: center; justify-content: center; text-align: center;
    }
    .card-front-meta {
      position: absolute; top: 18px; left: 20px; right: 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .card-cat-badge {
      font-size: 0.57rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 999px;
      background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.9);
      border: 1.5px solid rgba(255,255,255,0.32);
    }
    .card-seen-tag {
      font-size: 0.57rem; font-weight: 800; letter-spacing: 0.06em;
      padding: 4px 10px; border-radius: 999px;
      background: var(--gold); color: var(--ink);
      border: 1.5px solid rgba(26,26,26,0.4);
    }
    .card-word {
      font-weight: 900;
      font-size: clamp(2.8rem, 10vw, 5.8rem);
      color: #fff; line-height: 0.95; letter-spacing: -0.03em;
      word-break: break-word; max-width: 100%;
    }
    .card-reveal-hint {
      position: absolute; bottom: 16px; left: 0; right: 0; text-align: center;
      font-size: 0.56rem; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.28);
    }
    .card-know-btn {
      position: absolute; bottom: 12px; right: 18px;
      font-family: var(--font);
      font-size: 0.57rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 5px 12px; border-radius: 999px;
      border: 1.5px solid rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.82);
      cursor: pointer; transition: all var(--dur); z-index: 2;
    }
    .card-know-btn:hover { background: rgba(255,255,255,0.28); border-color: rgba(255,255,255,0.7); }

    .card-back {
      transform: rotateY(180deg);
      background: var(--surface);
      box-shadow: var(--shadow-lg);
      justify-content: center; gap: 12px;
    }
    .card-meaning {
      font-weight: 900;
      font-size: clamp(2rem, 8vw, 4.2rem);
      color: var(--ink); line-height: 0.95; letter-spacing: -0.035em;
    }
    .card-example-yo {
      font-size: 0.9rem; color: var(--teal); font-style: italic; line-height: 1.6;
      padding-top: 10px; border-top: 2px solid rgba(15,130,122,0.15);
    }
    .card-example-en { font-size: 0.8rem; color: var(--ink-mid); line-height: 1.5; }

    /* ── BROWSE NAV ───────────────────────────────────────── */
    .browse-nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .btn-nav {
      font-family: var(--font);
      font-size: 0.7rem; font-weight: 800; letter-spacing: 0.04em;
      padding: 11px 24px; border-radius: 999px;
      border: 2.5px solid var(--ink);
      background: var(--surface); color: var(--ink);
      cursor: pointer; transition: all var(--dur);
      flex-shrink: 0; box-shadow: var(--shadow-sm);
    }
    .btn-nav:hover:not(:disabled) { background: var(--ink); color: #fff; box-shadow: none; transform: translate(3px, 3px); }
    .btn-nav:disabled { opacity: 0.25; cursor: not-allowed; box-shadow: none; }
    .btn-nav-primary { background: var(--teal); border-color: var(--teal); color: #fff; }
    .btn-nav-primary:hover:not(:disabled) { background: var(--teal-deep); border-color: var(--teal-deep); }
    .browse-counter {
      font-size: 0.7rem; font-weight: 800; letter-spacing: 0.05em;
      color: var(--ink-mid); text-align: center; flex-shrink: 0;
    }

    /* ── QUIZ ─────────────────────────────────────────────── */
    .quiz-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .quiz-score { font-size: 0.8rem; font-weight: 700; color: var(--ink-mid); }
    .quiz-score strong { color: var(--teal); font-size: 1.05rem; font-weight: 900; }
    .btn-reset {
      font-family: var(--font);
      font-size: 0.6rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 7px 14px; border-radius: 999px;
      border: 2px solid var(--ink); background: var(--surface); color: var(--ink);
      cursor: pointer; transition: all var(--dur);
      box-shadow: 2px 2px 0 var(--ink);
    }
    .btn-reset:hover { background: var(--coral); border-color: var(--coral); color: #fff; box-shadow: none; transform: translate(2px, 2px); }

    .quiz-card {
      background: var(--gold);
      border: 3px solid var(--ink);
      border-radius: 18px;
      padding: clamp(28px, 5vw, 44px) clamp(20px, 4vw, 32px) clamp(24px, 4vw, 36px);
      text-align: center;
      box-shadow: var(--shadow-lg);
    }
    .quiz-instruction {
      font-size: 0.62rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(26,26,26,0.42); margin-bottom: 10px;
    }
    .quiz-prompt {
      font-size: clamp(1.6rem, 5.5vw, 2.6rem);
      font-weight: 900; color: var(--ink);
      line-height: 1.1; margin-bottom: 28px;
      letter-spacing: -0.03em;
    }
    .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 380px) { .quiz-options { grid-template-columns: 1fr; } }

    .quiz-opt {
      font-family: var(--font);
      font-size: 1rem; font-weight: 800;
      padding: 18px 14px; border-radius: 12px;
      border: 2.5px solid var(--ink);
      background: var(--surface); color: var(--ink);
      cursor: pointer; text-align: center; line-height: 1.3;
      transition: all var(--dur);
      box-shadow: 3px 3px 0 var(--ink);
    }
    .quiz-opt:hover:not(:disabled) { background: var(--ink); color: #fff; box-shadow: none; transform: translate(3px, 3px); }
    .quiz-opt.correct { background: var(--teal); border-color: var(--teal-deep); color: #fff; box-shadow: 3px 3px 0 var(--teal-deep); }
    .quiz-opt.wrong   { background: var(--coral); border-color: var(--coral-deep); color: #fff; box-shadow: 3px 3px 0 var(--coral-deep); }
    .quiz-opt.dim     { background: rgba(255,255,255,0.35); border-color: rgba(26,26,26,0.12); color: rgba(26,26,26,0.32); box-shadow: none; }
    .quiz-opt:disabled { cursor: default; }

    .btn-quiz-next {
      font-family: var(--font);
      width: 100%; margin-top: 18px;
      font-size: 0.74rem; font-weight: 800; letter-spacing: 0.09em; text-transform: uppercase;
      padding: 14px; border-radius: 12px;
      border: 2.5px solid var(--ink);
      background: var(--teal); color: #fff;
      cursor: pointer; transition: all var(--dur);
      box-shadow: var(--shadow-sm);
    }
    .btn-quiz-next:hover { background: var(--teal-deep); box-shadow: none; transform: translate(3px, 3px); }

    .quiz-nav { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; }

    /* ── QUIZ DONE ────────────────────────────────────────── */
    .quiz-done { text-align: center; padding: clamp(28px, 5vw, 44px) 16px clamp(24px, 4vw, 32px); }
    .quiz-done-glyph {
      font-size: clamp(2.2rem, 6vw, 3.5rem); font-weight: 900;
      color: var(--ink); margin-bottom: 10px; letter-spacing: -0.04em;
    }
    .quiz-done-title {
      font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 900;
      color: var(--ink); margin-bottom: 8px; letter-spacing: -0.04em;
    }
    .quiz-done-sub { font-size: 0.9rem; color: rgba(26,26,26,0.55); margin-bottom: 28px; line-height: 1.5; }

    /* ── FOOTER ───────────────────────────────────────────── */
    .footer { border-top: 3px solid var(--ink); padding: 20px var(--pad); background: var(--ink); }
    .footer-copy { font-size: 0.64rem; color: rgba(255,255,255,0.32); }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="#" class="nav-logo">Yoruba<span class="nav-logo-accent">Fluent</span></a>
  <div class="pill-nav">
    <a href="#" class="pill pill-home">Home</a>
    <a href="#" class="pill pill-blog">Blog</a>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="page-header-inner">
    <h1 class="page-title">100<br>Words</h1>
    <p class="page-subtitle">Build your Yorùbá vocabulary foundation one word at a time. Browse, flip, quiz yourself.</p>
    <span class="stat-chip" id="global-stat">0 / 20 seen</span>
  </div>
</div>

<!-- CATEGORY FAB (mobile) -->
<div class="cat-fab-wrap" id="cat-fab-wrap">
  <button class="cat-fab" id="cat-fab">
    <span id="cat-fab-label">All</span>
    <span class="cat-fab-icon">▾</span>
  </button>
  <div class="cat-dropdown" id="cat-dropdown"></div>
</div>
<div class="cat-dd-backdrop" id="cat-dd-backdrop"></div>

<!-- APP -->
<div class="app-outer">
  <div class="app-layout">

    <aside class="cat-sidebar cat-sidebar--left" id="sidebar-left"></aside>

    <div class="app-center">

      <div class="mode-tabs">
        <button class="mode-tab active" id="tab-browse">Browse</button>
        <button class="mode-tab"        id="tab-quiz">Quiz</button>
      </div>

      <!-- BROWSE -->
      <div id="panel-browse" class="panel active">
        <div class="progress-wrap">
          <div class="progress-track"><div class="progress-fill" id="b-fill"></div></div>
          <span class="progress-label" id="b-label">0 / 20</span>
        </div>

        <div class="browse-perspective">
          <div class="browse-card" id="browse-card">
            <div class="card-face card-front">
              <div class="card-front-meta">
                <span class="card-cat-badge" id="f-cat"></span>
                <span class="card-seen-tag"  id="f-seen" style="display:none">✓ seen</span>
              </div>
              <div class="card-word" id="f-word"></div>
              <div class="card-reveal-hint">tap to reveal</div>
              <button class="card-know-btn" id="btn-know">I already know this</button>
            </div>
            <div class="card-face card-back">
              <div class="card-meaning"    id="b-meaning"></div>
              <div class="card-example-yo" id="b-sent-yo"></div>
              <div class="card-example-en" id="b-sent-en"></div>
            </div>
          </div>
        </div>

        <div class="browse-nav">
          <button class="btn-nav"                 id="btn-prev">← prev</button>
          <span   class="browse-counter"          id="b-counter">1 / 20</span>
          <button class="btn-nav btn-nav-primary" id="btn-next">next →</button>
        </div>
      </div>

      <!-- QUIZ -->
      <div id="panel-quiz" class="panel">
        <div class="quiz-meta">
          <span class="quiz-score" id="q-score">Score: <strong>0</strong> / 0</span>
          <button class="btn-reset" id="btn-reset">Reset</button>
        </div>

        <div class="quiz-card" id="quiz-card">
          <div class="quiz-instruction">Which Yoruba word means…</div>
          <div class="quiz-prompt" id="q-prompt"></div>
          <div class="quiz-options" id="q-options"></div>
        </div>

        <div class="quiz-card" id="quiz-done-screen" style="display:none">
          <div class="quiz-done">
            <div class="quiz-done-glyph">Ẹ ṣé</div>
            <div class="quiz-done-title">Round complete!</div>
            <div class="quiz-done-sub" id="quiz-done-sub"></div>
            <button class="btn-quiz-next" id="btn-quiz-again">Play again →</button>
          </div>
        </div>

        <div class="quiz-nav">
          <button class="btn-nav" id="btn-qprev" style="display:none">← prev</button>
          <button class="btn-nav btn-nav-primary" id="btn-qnext" style="display:none">next →</button>
        </div>
      </div>

    </div>

    <aside class="cat-sidebar cat-sidebar--right" id="sidebar-right"></aside>

  </div>
</div>

<footer class="footer">
  <span class="footer-copy">© 2026 YorubaFluent</span>
</footer>

<script>
/* ── STATE ─────────────────────────────────────────────── */
var allWords = [], filtered = [], activeMode = 'browse', activeCat = 'all';
var bIndex = 0, bFlipped = false;
var qCorrect = 0, qTotal = 0, qOrder = [], qCursor = 0, qAnswered = false, qHistory = [];
var seenIds = new Set();
var CATS = ['Greetings','Family','Food & Drink','Body','Time','Places','Nature','Verbs','Adjectives','Concepts'];

/* ── INIT ──────────────────────────────────────────────── */
function init(words) {
  allWords = words;
  buildCatSidebars();
  buildCatDropdown();
  setCategory('all');
  bindEvents();
}

function buildCatSidebars() {
  var allItems = [{ cat: 'all', label: 'All', n: allWords.length }];
  CATS.forEach(function(cat) {
    var n = allWords.filter(function(w){ return w.category === cat; }).length;
    if (n > 0) allItems.push({ cat: cat, label: cat, n: n });
  });
  function makeBtn(item) {
    var btn = document.createElement('button');
    btn.className = 'sidebar-item'; btn.dataset.cat = item.cat;
    btn.innerHTML = '<span>' + item.label + '</span><span class="sidebar-count">' + item.n + '</span>';
    return btn;
  }
  var left = document.getElementById('sidebar-left');
  var right = document.getElementById('sidebar-right');
  allItems.slice(0, Math.ceil(allItems.length / 2)).forEach(function(i){ left.appendChild(makeBtn(i)); });
  allItems.slice(Math.ceil(allItems.length / 2)).forEach(function(i){ right.appendChild(makeBtn(i)); });
}

function buildCatDropdown() {
  var dropdown = document.getElementById('cat-dropdown');
  var allItems = [{ cat: 'all', label: 'All' }];
  CATS.forEach(function(cat) { allItems.push({ cat: cat, label: cat }); });
  allItems.forEach(function(item) {
    var btn = document.createElement('button');
    btn.className = 'cat-dd-item'; btn.dataset.cat = item.cat; btn.textContent = item.label;
    dropdown.appendChild(btn);
  });
}

/* ── CATEGORY ──────────────────────────────────────────── */
function setCategory(cat) {
  activeCat = cat;
  filtered = cat === 'all' ? allWords.slice() : allWords.filter(function(w){ return w.category === cat; });
  document.querySelectorAll('.sidebar-item').forEach(function(b){ b.classList.toggle('active', b.dataset.cat === cat); });
  document.querySelectorAll('.cat-dd-item').forEach(function(b){ b.classList.toggle('active', b.dataset.cat === cat); });
  var fabLabel = document.getElementById('cat-fab-label');
  if (fabLabel) fabLabel.textContent = cat === 'all' ? 'All' : cat;
  bIndex = 0; bFlipped = false;
  renderBrowse();
  if (activeMode === 'quiz') startQuiz();
}

function openCatFab()  { document.getElementById('cat-fab-wrap').classList.add('open');    document.getElementById('cat-dd-backdrop').classList.add('open'); }
function closeCatFab() { document.getElementById('cat-fab-wrap').classList.remove('open'); document.getElementById('cat-dd-backdrop').classList.remove('open'); }

/* ── BROWSE ────────────────────────────────────────────── */
function renderBrowse() {
  if (!filtered.length) return;
  var w = filtered[bIndex];
  document.getElementById('f-word').textContent    = w.yoruba;
  document.getElementById('f-cat').textContent     = w.category;
  document.getElementById('b-meaning').textContent = w.meaning;
  document.getElementById('b-sent-yo').textContent = w.sent_yo;
  document.getElementById('b-sent-en').textContent = w.sent_en;
  document.getElementById('f-seen').style.display  = seenIds.has(w.id) ? '' : 'none';
  document.getElementById('b-counter').textContent = (bIndex + 1) + ' / ' + filtered.length;
  document.getElementById('btn-prev').disabled = bIndex === 0;
  document.getElementById('btn-next').disabled = bIndex === filtered.length - 1;
  updateBrowseProgress();
  updateGlobalStat();
  var card = document.getElementById('browse-card');
  bFlipped = false;
  if (card.classList.contains('flipped')) {
    card.style.transition = 'none'; card.classList.remove('flipped');
    requestAnimationFrame(function(){ requestAnimationFrame(function(){ card.style.transition = ''; }); });
  }
}

function updateBrowseProgress() {
  var seen = filtered.filter(function(w){ return seenIds.has(w.id); }).length;
  var total = filtered.length, pct = total ? (seen / total * 100) : 0;
  var fill = document.getElementById('b-fill'), label = document.getElementById('b-label');
  fill.style.width = pct + '%';
  var done = seen === total && total > 0;
  fill.classList.toggle('complete', done); label.classList.toggle('complete', done);
  label.textContent = done ? 'All seen ✓' : seen + ' / ' + total;
}

function updateGlobalStat() {
  var el = document.getElementById('global-stat');
  if (el) el.textContent = seenIds.size + ' / ' + allWords.length + ' seen';
}

function flipCard() {
  var card = document.getElementById('browse-card');
  bFlipped = !bFlipped; card.classList.toggle('flipped', bFlipped);
  if (bFlipped && filtered.length) {
    var w = filtered[bIndex];
    if (!seenIds.has(w.id)) {
      seenIds.add(w.id);
      document.getElementById('f-seen').style.display = '';
      updateBrowseProgress(); updateGlobalStat();
    }
  }
}

function navBrowse(dir) {
  var next = bIndex + dir;
  if (next < 0 || next >= filtered.length) return;
  var card = document.getElementById('browse-card'), wasFlipped = bFlipped;
  if (bFlipped) { card.style.transition = 'none'; card.classList.remove('flipped'); bFlipped = false; }
  function doSwap() { bIndex = next; renderBrowse(); }
  if (wasFlipped) {
    var outA = dir > 0 ? 'rotateY(90deg)' : 'rotateY(-90deg)', inA = dir > 0 ? 'rotateY(-90deg)' : 'rotateY(90deg)';
    card.style.transition = 'transform 170ms ease-in'; card.style.transform = outA;
    setTimeout(function(){ doSwap(); card.style.transition = 'none'; card.style.transform = inA;
      requestAnimationFrame(function(){ requestAnimationFrame(function(){ card.style.transition = 'transform 170ms ease-out'; card.style.transform = ''; }); }); }, 175);
  } else {
    var outX = dir > 0 ? '52px' : '-52px', inX = dir > 0 ? '-52px' : '52px';
    card.style.transition = 'transform 150ms ease-in, opacity 150ms ease-in';
    card.style.transform = 'translateX(' + outX + ')'; card.style.opacity = '0';
    setTimeout(function(){ doSwap(); card.style.transition = 'none'; card.style.transform = 'translateX(' + inX + ')'; card.style.opacity = '0';
      requestAnimationFrame(function(){ requestAnimationFrame(function(){ card.style.transition = 'transform 150ms ease-out, opacity 150ms ease-out'; card.style.transform = ''; card.style.opacity = ''; }); }); }, 155);
  }
}

function markKnown(e) {
  e.stopPropagation();
  if (!filtered.length) return;
  var w = filtered[bIndex];
  if (!seenIds.has(w.id)) { seenIds.add(w.id); updateBrowseProgress(); updateGlobalStat(); }
  if (bIndex < filtered.length - 1) navBrowse(1);
  else document.getElementById('f-seen').style.display = '';
}

/* ── QUIZ ──────────────────────────────────────────────── */
function shuffle(a) {
  var arr = a.slice();
  for (var i = arr.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)), t = arr[i]; arr[i] = arr[j]; arr[j] = t; }
  return arr;
}

function startQuiz() {
  qCorrect = 0; qTotal = 0; qAnswered = false; qHistory = [];
  qOrder = shuffle(filtered.map(function(_, i){ return i; })); qCursor = 0;
  updateQuizScore();
  document.getElementById('quiz-card').style.display = '';
  document.getElementById('quiz-done-screen').style.display = 'none';
  renderQuiz();
}

function getDistractors(word, count) {
  var same = allWords.filter(function(w){ return w.category === word.category && w.id !== word.id; });
  var others = allWords.filter(function(w){ return w.category !== word.category; });
  var pool = shuffle(same.concat(others)), seen = new Set([word.yoruba]), result = [];
  for (var i = 0; i < pool.length && result.length < count; i++) {
    if (!seen.has(pool[i].yoruba)) { seen.add(pool[i].yoruba); result.push(pool[i]); }
  }
  return result;
}

function renderQuiz() {
  var btnPrev = document.getElementById('btn-qprev'), btnNext = document.getElementById('btn-qnext');
  if (qCursor >= qOrder.length) {
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('quiz-done-screen').style.display = '';
    document.getElementById('quiz-done-sub').textContent = qCorrect + ' correct out of ' + qTotal;
    btnPrev.style.display = qHistory.length > 0 ? '' : 'none'; btnPrev.disabled = false;
    btnNext.style.display = 'none'; return;
  }
  document.getElementById('quiz-card').style.display = '';
  document.getElementById('quiz-done-screen').style.display = 'none';
  var word = filtered[qOrder[qCursor]], alreadyAnswered = qCursor < qHistory.length, options;
  if (alreadyAnswered) { options = qHistory[qCursor].options; qAnswered = true; }
  else { options = shuffle([word].concat(getDistractors(word, 3))); qAnswered = false; }
  document.getElementById('q-prompt').textContent = word.meaning;
  var optEl = document.getElementById('q-options'); optEl.innerHTML = '';
  options.forEach(function(opt) {
    var btn = document.createElement('button'); btn.className = 'quiz-opt';
    btn.textContent = opt.yoruba; btn.dataset.id = String(opt.id);
    if (alreadyAnswered) {
      btn.disabled = true; var h = qHistory[qCursor];
      if (opt.id === h.correctId) btn.classList.add('correct');
      else if (opt.id === h.selectedId) btn.classList.add('wrong');
      else btn.classList.add('dim');
    } else { btn.addEventListener('click', function(){ selectOpt(opt.id, word.id, options); }); }
    optEl.appendChild(btn);
  });
  if (qHistory.length === 0) { btnPrev.style.display = 'none'; btnNext.style.display = 'none'; }
  else { btnPrev.style.display = ''; btnPrev.disabled = (qCursor === 0); btnNext.style.display = ''; btnNext.disabled = !qAnswered; }
}

function selectOpt(selectedId, correctId, options) {
  if (qAnswered) return; qAnswered = true;
  qHistory.push({ selectedId: selectedId, correctId: correctId, options: options });
  qTotal++; if (selectedId === correctId) qCorrect++;
  updateQuizScore();
  document.querySelectorAll('.quiz-opt').forEach(function(btn) {
    btn.disabled = true; var id = parseInt(btn.dataset.id, 10);
    if (id === correctId) btn.classList.add('correct');
    else if (id === selectedId) btn.classList.add('wrong');
    else btn.classList.add('dim');
  });
  document.getElementById('btn-qprev').style.display = ''; document.getElementById('btn-qprev').disabled = (qCursor === 0);
  document.getElementById('btn-qnext').style.display = ''; document.getElementById('btn-qnext').disabled = false;
}

function advanceQuiz()  { if (!qAnswered) return; qCursor++; renderQuiz(); }
function retreatQuiz()  { if (qCursor > 0) { qCursor--; renderQuiz(); } }
function updateQuizScore() { document.getElementById('q-score').innerHTML = 'Score: <strong>' + qCorrect + '</strong> / ' + qTotal; }

/* ── EVENTS ────────────────────────────────────────────── */
function bindEvents() {
  document.getElementById('tab-browse').addEventListener('click', function() {
    if (activeMode === 'browse') return; activeMode = 'browse';
    document.getElementById('tab-browse').classList.add('active'); document.getElementById('tab-quiz').classList.remove('active');
    document.getElementById('panel-browse').classList.add('active'); document.getElementById('panel-quiz').classList.remove('active');
  });
  document.getElementById('tab-quiz').addEventListener('click', function() {
    if (activeMode === 'quiz') return; activeMode = 'quiz';
    document.getElementById('tab-quiz').classList.add('active'); document.getElementById('tab-browse').classList.remove('active');
    document.getElementById('panel-quiz').classList.add('active'); document.getElementById('panel-browse').classList.remove('active');
    startQuiz();
  });
  document.getElementById('sidebar-left').addEventListener('click', function(e) { var b = e.target.closest('.sidebar-item'); if (b) setCategory(b.dataset.cat); });
  document.getElementById('sidebar-right').addEventListener('click', function(e) { var b = e.target.closest('.sidebar-item'); if (b) setCategory(b.dataset.cat); });
  document.getElementById('cat-fab').addEventListener('click', function(e) { e.stopPropagation(); document.getElementById('cat-fab-wrap').classList.contains('open') ? closeCatFab() : openCatFab(); });
  document.getElementById('cat-dropdown').addEventListener('click', function(e) { var b = e.target.closest('.cat-dd-item'); if (b) { setCategory(b.dataset.cat); closeCatFab(); } });
  document.getElementById('cat-dd-backdrop').addEventListener('click', closeCatFab);
  document.getElementById('browse-card').addEventListener('click', function(e) { if (e.target.closest('.card-know-btn')) return; flipCard(); });
  document.getElementById('btn-prev').addEventListener('click', function(e) { e.stopPropagation(); navBrowse(-1); });
  document.getElementById('btn-next').addEventListener('click', function(e) { e.stopPropagation(); navBrowse(1); });
  document.getElementById('btn-know').addEventListener('click', markKnown);
  document.getElementById('btn-reset').addEventListener('click', startQuiz);
  document.getElementById('btn-quiz-again').addEventListener('click', startQuiz);
  document.getElementById('btn-qnext').addEventListener('click', advanceQuiz);
  document.getElementById('btn-qprev').addEventListener('click', retreatQuiz);
}
